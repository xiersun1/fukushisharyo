name: Dispatch notice emails

on:
  push:
    branches: [main]
    paths:
      - src/data/sources.json
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send unsent notices
        env:
          NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$NOTIFY_WEBHOOK_SECRET" ]; then
            echo "NOTIFY_WEBHOOK_SECRET is not configured; skipping."
            exit 0
          fi

          for attempt in $(seq 1 20); do
            if curl --fail-with-body --silent --show-error \
              -X POST \
              -H "Authorization: Bearer $NOTIFY_WEBHOOK_SECRET" \
              -H "Content-Type: application/json" \
              --data '{}' \
              https://fukushisharyo.pages.dev/api/dispatch; then
              exit 0
            fi
            sleep 15
          done

          echo "Notification dispatch failed after retries."
          exit 1

