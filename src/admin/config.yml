local_backend: true

backend:
  name: github
  repo: xiersun1/fukushisharyo
  branch: main
  use_graphql: true
  site_domain: "https://fukushisharyo.pages.dev"
  base_url: "https://fukushisharyo.pages.dev"
  auth_endpoint: "/api/auth"

publish_mode: simple
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"
site_url: "https://fukushisharyo.pages.dev/"
display_url: "https://fukushisharyo.pages.dev/"
locale: "ja"
search: false

collections:
  - name: "site_data"
    label: "サイトデータ"
    files:
      - name: "notices"
        label: "お知らせ一覧"
        file: "src/data/sources.json"
        format: "json"
        fields:
          - label: "更新日"
            name: "updatedAt"
            widget: "string"
            hint: "例: 2026-07-10"
          - label: "お知らせ"
            name: "notices"
            widget: "list"
            summary: "{{fields.publishedAt}} / {{fields.title}}"
            fields:
              - label: "ID"
                name: "id"
                widget: "string"
                hint: "英数字とハイフンで一意にします"
              - label: "掲載日"
                name: "publishedAt"
                widget: "string"
                hint: "例: 2026-07-10"
              - label: "タイトル"
                name: "title"
                widget: "string"
              - label: "団体"
                name: "org"
                widget: "string"
              - label: "状態コード"
                name: "statusCode"
                widget: "select"
                options:
                  - { label: "受付中", value: "open" }
                  - { label: "受付予定", value: "upcoming" }
                  - { label: "終了", value: "closed" }
                  - { label: "監視中", value: "watch" }
              - label: "状態表示"
                name: "statusLabel"
                widget: "string"
              - label: "応募期間"
                name: "period"
                widget: "string"
              - label: "概要"
                name: "summary"
                widget: "text"
              - label: "詳細リンク"
                name: "detailUrl"
                widget: "string"
              - label: "確認日"
                name: "checkedAt"
                widget: "string"
                hint: "例: 2026-07-10"
              - label: "根拠メモ"
                name: "sourceNote"
                widget: "text"
