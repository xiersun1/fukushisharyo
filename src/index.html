<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>福祉車両応募アラート</title>
  <meta name="description" content="福祉車両の贈呈・助成情報をお知らせ形式で確認できるサイトです。">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>福祉車両応募アラート</h1>
  </header>

  <main>
    <section class="notice-list" aria-label="お知らせ">
      <div id="noticeList" class="notices"></div>
      <p id="dataStatus" class="data-status">お知らせを読み込み中です。</p>
    </section>

    <section class="mail-box" aria-label="メール登録">
      <h2>メール登録</h2>
      <form id="alertForm" class="mail-form">
        <label>
          <span>メールアドレス</span>
          <input id="emailInput" type="email" placeholder="sample@example.jp" autocomplete="email" required>
        </label>
        <button type="submit">登録</button>
      </form>
      <p id="formMessage" class="form-message">応募開始や締切前のお知らせを受け取るための登録欄です。</p>
    </section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
